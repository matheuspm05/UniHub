<form class="rounded-xl border border-unihub-line bg-white p-6 shadow-card" method="post" action="/perfil/editar">
  {{ form.hidden_tag() }}
  {% if erro %}
    <div class="mb-5 rounded-lg border border-red-100 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700">{{ erro }}</div>
  {% endif %}

  <div class="grid gap-8 lg:grid-cols-[170px_1fr]">
    <section>
      <h2 class="text-sm font-extrabold text-unihub-ink">Foto de perfil</h2>
      <div class="mt-6 flex flex-col items-center text-center">
        <div class="relative">
          <span class="grid h-36 w-36 place-items-center rounded-full bg-gradient-to-br from-uvv-100 to-white text-4xl font-extrabold text-[#0B5FEA] shadow-sm">
            {{ iniciais(current_user.nome) }}
          </span>
          <button class="absolute bottom-2 right-1 grid h-10 w-10 place-items-center rounded-full border border-unihub-line bg-white text-[#0B5FEA] shadow-sm" type="button" aria-label="Alterar foto">
            <i data-lucide="camera" class="h-5 w-5"></i>
          </button>
        </div>
        <p class="mt-5 text-sm font-medium text-unihub-muted">PNG ou JPG. Max. 5MB</p>
        <button class="mt-3 h-10 rounded-lg border border-[#8EB4F3] px-5 text-sm font-extrabold text-[#0B5FEA] transition hover:bg-uvv-50" type="button">
          Alterar foto
        </button>
      </div>
    </section>

    <section class="grid gap-5">
      <label class="grid gap-2 text-sm font-extrabold text-unihub-ink">
        Nome completo <span class="text-red-500">*</span>
        <input class="h-12 rounded-lg border border-[#CBD6E6] bg-white px-4 text-base font-medium text-unihub-ink outline-none transition focus:border-uvv-500 focus:ring-4 focus:ring-uvv-100" type="text" name="nome" value="{{ current_user.nome }}" required>
      </label>

      <div class="grid gap-5 md:grid-cols-2">
        <label class="grid gap-2 text-sm font-extrabold text-unihub-ink">
          Curso <span class="text-red-500">*</span>
          <span class="relative">
            <select class="h-12 w-full appearance-none rounded-lg border border-[#CBD6E6] bg-white px-4 pr-10 text-base font-medium text-unihub-ink outline-none transition focus:border-uvv-500 focus:ring-4 focus:ring-uvv-100" name="curso" required>
              {% set cursos = ["Ciência da Computação", "Engenharia de Software", "Sistemas de Informação", "Design", "Administração"] %}
              {% if current_user.curso not in cursos %}
                <option value="{{ current_user.curso }}" selected>{{ current_user.curso }}</option>
              {% endif %}
              {% for curso in cursos %}
                <option value="{{ curso }}" {% if current_user.curso == curso %}selected{% endif %}>{{ curso }}</option>
              {% endfor %}
            </select>
            <i data-lucide="chevron-down" class="pointer-events-none absolute right-3 top-1/2 h-5 w-5 -translate-y-1/2 text-unihub-muted"></i>
          </span>
        </label>

        <label class="grid gap-2 text-sm font-extrabold text-unihub-ink">
          Periodo <span class="text-red-500">*</span>
          <span class="relative">
            <select class="h-12 w-full appearance-none rounded-lg border border-[#CBD6E6] bg-white px-4 pr-10 text-base font-medium text-unihub-ink outline-none transition focus:border-uvv-500 focus:ring-4 focus:ring-uvv-100" name="periodo" required>
              {% set periodos = ["1º período", "2º período", "3º período", "4º período", "5º período", "6º período", "7º período", "8º período"] %}
              {% if current_user.periodo not in periodos %}
                <option value="{{ current_user.periodo }}" selected>{{ current_user.periodo }}</option>
              {% endif %}
              {% for periodo in periodos %}
                <option value="{{ periodo }}" {% if current_user.periodo == periodo %}selected{% endif %}>{{ periodo }}</option>
              {% endfor %}
            </select>
            <i data-lucide="chevron-down" class="pointer-events-none absolute right-3 top-1/2 h-5 w-5 -translate-y-1/2 text-unihub-muted"></i>
          </span>
        </label>
      </div>

      <label class="grid gap-2 text-sm font-extrabold text-unihub-ink">
        Cidade <span class="text-red-500">*</span>
        <input class="h-12 rounded-lg border border-[#CBD6E6] bg-white px-4 text-base font-medium text-unihub-ink outline-none transition focus:border-uvv-500 focus:ring-4 focus:ring-uvv-100" type="text" name="cidade" value="{{ current_user.cidade }}" required>
      </label>

      <label class="grid gap-2 text-sm font-extrabold text-unihub-ink">
        E-mail <span class="text-red-500">*</span>
        <input class="h-12 rounded-lg border border-[#CBD6E6] bg-white px-4 text-base font-medium text-unihub-ink outline-none transition focus:border-uvv-500 focus:ring-4 focus:ring-uvv-100" type="email" name="email" value="{{ current_user.email }}" required>
      </label>
    </section>
  </div>

  <label class="mt-6 grid gap-2 text-sm font-extrabold text-unihub-ink">
    Sobre mim
    <span class="relative">
      <textarea class="min-h-24 w-full rounded-lg border border-[#CBD6E6] bg-white px-4 py-3 text-base font-medium leading-6 text-unihub-ink outline-none transition focus:border-uvv-500 focus:ring-4 focus:ring-uvv-100" name="bio" maxlength="500">{{ current_user.bio or "" }}</textarea>
      <span class="absolute bottom-3 right-4 text-xs font-semibold text-unihub-muted">{{ (current_user.bio or "")|length }}/500</span>
    </span>
  </label>

  <section class="mt-6">
    <h2 class="text-sm font-extrabold text-unihub-ink">Interesses</h2>
    <div class="mt-2 rounded-lg border border-[#CBD6E6] bg-white p-3">
      <div class="flex flex-wrap gap-2">
        {% for interesse in ["Programacao", "Inteligencia Artificial", "Design", "Empreendedorismo", "Tecnologia"] %}
          <span class="inline-flex items-center gap-2 rounded-lg bg-[#F2F7FF] px-3 py-2 text-sm font-semibold text-unihub-ink">
            {{ interesse }}
            <i data-lucide="x" class="h-4 w-4 text-unihub-muted"></i>
          </span>
        {% endfor %}
      </div>
      <input class="mt-3 h-8 w-full border-0 p-0 text-sm font-medium text-unihub-ink outline-none placeholder:text-unihub-muted" type="text" placeholder="Adicione seus interesses...">
    </div>
  </section>

  <div class="mt-8 flex flex-col-reverse gap-4 border-t border-unihub-line pt-6 sm:flex-row sm:items-center sm:justify-between">
    <a href="/perfil" class="inline-flex h-11 items-center justify-center rounded-lg border border-[#CBD6E6] px-7 text-sm font-extrabold text-unihub-ink transition hover:bg-unihub-surface">Cancelar</a>
    <div class="flex flex-col gap-4 sm:flex-row">
      <button class="inline-flex h-11 items-center justify-center gap-2 rounded-lg border border-red-200 px-6 text-sm font-extrabold text-red-600 transition hover:bg-red-50" type="reset">
        <i data-lucide="trash-2" class="h-5 w-5"></i>
        Redefinir alteracoes
      </button>
      <button class="inline-flex h-11 items-center justify-center gap-2 rounded-lg bg-[#0B5FEA] px-7 text-sm font-extrabold text-white shadow-card transition hover:bg-[#004CC5]" type="submit">
        <i data-lucide="save" class="h-5 w-5"></i>
        Salvar alteracoes
      </button>
    </div>
  </div>
</form>
