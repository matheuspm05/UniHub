<section class="rounded-xl border border-unihub-line bg-white p-6 shadow-card">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-extrabold text-unihub-ink">Redes sociais</h2>
  </div>
  <div class="mt-5 grid gap-4 text-sm font-semibold text-unihub-muted md:grid-cols-2">
    <span class="inline-flex items-center gap-3">
      <i data-lucide="mail" class="h-7 w-7 text-[#0B5FEA]"></i>
      {{ current_user.email }}
    </span>
    {% if not is_admin_user(current_user) %}
      <span class="inline-flex items-center gap-3">
        <i data-lucide="map-pin" class="h-7 w-7 text-emerald-600"></i>
        {{ current_user.cidade }}
      </span>
    {% endif %}
  </div>
</section>
