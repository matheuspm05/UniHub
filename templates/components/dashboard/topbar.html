<header class="sticky top-0 z-30 border-b border-unihub-line bg-white/95 backdrop-blur">
  <div class="flex h-24 w-full items-center gap-4 px-5 sm:px-7">
    <a href="/dashboard" class="inline-flex items-center gap-2 lg:hidden" aria-label="UniHub inicio">
      <img src="{{ url_for('static', filename='imgs/logos/logo.png') }}" alt="Logo UniHub" class="h-10 w-10 object-cover">
      <span class="text-2xl font-extrabold text-unihub-ink">UniHub</span>
    </a>

    <form class="hidden flex-1 sm:block">
      <label class="relative block max-w-[640px]">
        <i data-lucide="search" class="pointer-events-none absolute left-4 top-1/2 h-6 w-6 -translate-y-1/2 text-unihub-muted"></i>
        <input
          class="h-12 w-full rounded-lg border border-[#CBD6E6] bg-white pl-12 pr-4 text-base font-medium outline-none transition placeholder:text-unihub-muted focus:border-uvv-500 focus:ring-4 focus:ring-uvv-100"
          type="search"
          placeholder="Buscar por topicos, pessoas, eventos..."
        >
      </label>
    </form>

    <div class="ml-auto flex items-center gap-4">
      <a href="/notificacoes" class="relative grid h-11 w-11 place-items-center rounded-lg text-unihub-muted transition hover:bg-unihub-surface hover:text-[#0B5FEA]" aria-label="Notificacoes">
        <i data-lucide="bell" class="h-6 w-6"></i>
        {% if notificacoes_count %}
          <span class="absolute right-1 top-0 grid h-5 min-w-5 place-items-center rounded-full bg-[#0B5FEA] px-1 text-xs font-extrabold text-white">{{ notificacoes_count }}</span>
        {% endif %}
      </a>
      <a href="/mensagens" class="relative grid h-11 w-11 place-items-center rounded-lg text-unihub-muted transition hover:bg-unihub-surface hover:text-[#0B5FEA]" aria-label="Mensagens">
        <i data-lucide="messages-square" class="h-6 w-6"></i>
        {% if mensagens_count %}
          <span class="absolute right-1 top-0 grid h-5 min-w-5 place-items-center rounded-full bg-[#0B5FEA] px-1 text-xs font-extrabold text-white">{{ mensagens_count }}</span>
        {% endif %}
      </a>
    </div>
  </div>
</header>
