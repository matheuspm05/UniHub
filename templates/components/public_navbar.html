<header class="sticky top-0 z-40 border-b border-unihub-line/80 bg-white/95 backdrop-blur">
  <nav class="mx-auto flex h-24 w-full max-w-7xl items-center justify-between px-5 sm:px-8" aria-label="Navegacao principal">
    {% include "components/logo.html" %}

    <div class="hidden items-center gap-12 text-[1.08rem] font-semibold text-unihub-ink lg:flex">
      <a class="transition hover:text-uvv-700" href="{{ url_for('main.index') }}#sobre">Sobre</a>
      <a class="transition hover:text-uvv-700" href="{{ url_for('main.index') }}#comparativo">Funcionalidades</a>
      <a class="transition hover:text-uvv-700" href="{{ url_for('main.index') }}#como-funciona">Como funciona</a>
    </div>

    <div class="flex items-center gap-3">
      <a href="/auth/login" class="inline-flex rounded-xl border border-[#C7D9FA] bg-[#F4F8FF] px-4 py-2.5 text-sm font-semibold text-[#0A3F9D] shadow-sm transition hover:border-[#0B5FEA] hover:bg-white hover:text-[#003B8F] sm:px-6 sm:py-3.5 sm:text-base">
        Entrar
      </a>
      <a href="/auth/cadastro" class="hidden rounded-xl bg-[#0B5FEA] px-6 py-3.5 text-base font-semibold text-white shadow-card transition hover:bg-[#004CC5] sm:inline-flex">
        Criar conta
      </a>

      <details class="relative lg:hidden">
        <summary class="grid h-11 w-11 cursor-pointer list-none place-items-center rounded-xl border border-unihub-line bg-white text-unihub-ink shadow-sm transition hover:border-[#0B5FEA] hover:text-[#0B5FEA]">
          <i data-lucide="menu" class="h-5 w-5"></i>
        </summary>
        <div class="absolute right-0 top-14 z-40 w-64 overflow-hidden rounded-2xl border border-unihub-line bg-white shadow-soft">
          <div class="grid gap-1 p-3">
            <a class="rounded-xl px-3 py-3 text-sm font-bold text-unihub-ink transition hover:bg-unihub-surface" href="{{ url_for('main.index') }}#sobre">Sobre</a>
            <a class="rounded-xl px-3 py-3 text-sm font-bold text-unihub-ink transition hover:bg-unihub-surface" href="{{ url_for('main.index') }}#comparativo">Funcionalidades</a>
            <a class="rounded-xl px-3 py-3 text-sm font-bold text-unihub-ink transition hover:bg-unihub-surface" href="{{ url_for('main.index') }}#como-funciona">Como funciona</a>
            <a class="mt-2 inline-flex items-center justify-center rounded-xl bg-[#0B5FEA] px-4 py-3 text-sm font-extrabold text-white" href="/auth/cadastro">Criar conta</a>
          </div>
        </div>
      </details>
    </div>
  </nav>
</header>
